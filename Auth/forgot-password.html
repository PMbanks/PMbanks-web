<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
linear-gradient(
135deg,
#0d1117,
#111827
);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:'Inter',sans-serif;

padding:20px;
}

.box{
width:100%;
max-width:420px;

background:rgba(22,27,34,.88);
backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.08);

border-radius:28px;

padding:40px 32px;

box-shadow:
0 20px 50px rgba(0,0,0,.45);
}

.logo{
font-size:3rem;
text-align:center;
margin-bottom:10px;
}

h1{
text-align:center;
font-size:2rem;
font-weight:800;
color:white;
margin-bottom:12px;
}

.subtitle{
text-align:center;
color:#8b949e;
font-size:.95rem;
line-height:1.6;
margin-bottom:28px;
}

.spam-warning{
background:rgba(255,193,7,.08);
border:1px solid rgba(255,193,7,.25);
color:#ffd54f;
padding:14px;
border-radius:14px;
font-size:.85rem;
line-height:1.5;
margin-bottom:22px;
}

input{
width:100%;
padding:16px;
margin-bottom:18px;

background:#0d1117;
color:white;

border:1px solid rgba(255,255,255,.08);

border-radius:14px;

font-size:.95rem;

transition:.25s;
}

input:focus{
outline:none;
border-color:#58a6ff;
box-shadow:0 0 0 3px rgba(88,166,255,.12);
}

button{
width:100%;
padding:16px;

background:
linear-gradient(
135deg,
#1f6feb,
#58a6ff
);

border:none;
color:white;
font-weight:700;
font-size:.95rem;

border-radius:14px;

cursor:pointer;

transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(31,111,235,.35);
}

.bottom-links{
margin-top:22px;

display:flex;
justify-content:center;
}

a{
color:#58a6ff;
text-decoration:none;
font-size:.9rem;
font-weight:600;
}

a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="box">

<div class="logo">🔐</div>

<h1>Reset Password</h1>

<p class="subtitle">
Enter your email address and we'll send you a secure password reset link.
</p>

<div class="spam-warning">
⚠️ If you don't receive the email within a few minutes, check your spam or junk folder.
</div>

<input
type="email"
id="email"
placeholder="Enter your email">

<button id="resetBtn">
Send Reset Email
</button>

<div class="bottom-links">
<a href="login.html">
← Back To Login
</a>
</div>

</div>

<script type="module"
src="../Scripts/app.js"></script>

</body>
</html>
