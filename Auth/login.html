<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
color:white;
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
background:
radial-gradient(circle at top left,
rgba(88,166,255,.15),
transparent 30%), 

radial-gradient(circle at bottom right,
rgba(0,255,170,.08),
transparent 30%), 

#0d1117;
overflow:hidden;
position:relative;
z-index:10;
}
.box{
background:rgba(22,27,34,.88);

backdrop-filter:blur(12px);

padding:40px;

border-radius:28px;

width:380px;

display:flex;
flex-direction:column;
gap:15px;

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 20px 50px rgba(0,0,0,.45);
animation:fadeUp .7s ease;
}
input:focus{
outline:none;
border-color:#58a6ff;
box-shadow:0 0 0 3px rgba(88,166,255,.12);
}
input{
padding:14px;
border-radius:10px;
border:1px solid rgba(255,255,255,.08);
background:#0d1117;
color:white;
transition:.25s;
width:100%;
box-sizing:border-box;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:
linear-gradient(
135deg,
#1f6feb,
#58a6ff
);
color:white;
font-weight:bold;
cursor:pointer;
}
button:hover{
transform:translateY(-2px);

box-shadow:
0 10px 25px rgba(31,111,235,.35);
}
a{
color:#58a6ff;
text-align:center;
text-decoration:none;

transition:.25s;
}

a:hover{
color:white;
}
.bg-blur{
position:fixed;

width:400px;
height:400px;

border-radius:50%;

filter:blur(120px);

z-index:-1;

animation:float 12s ease-in-out infinite;
}

.blur1{
background:rgba(88,166,255,.18);

top:-120px;
left:-120px;
}

.blur2{
background:rgba(0,255,170,.10);

bottom:-120px;
right:-120px;

animation-delay:4s;
}
.title{
font-size:3rem;

font-weight:800;

letter-spacing:-1px;

background:
linear-gradient(
135deg,
#ffffff,
#58a6ff
);
background-clip:text;
-webkit-background-clip:text;

color:transparent;
-webkit-text-fill-color:transparent;

margin-bottom:10px;
}
.grid-bg{
position:fixed;

inset:0;

background-image:
linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);

background-size:40px 40px;

mask-image:radial-gradient(circle at center, black 30%, transparent 90%);

z-index:-3;

animation:gridMove 20s linear infinite;
}

@keyframes gridMove{

0%{
transform:translateY(0px);
}

100%{
transform:translateY(40px);
}

}
.light-beam{
position:fixed;

top:-200px;
left:50%;

transform:translateX(-50%) rotate(25deg);

width:600px;
height:120vh;

background:
linear-gradient(
to bottom,
rgba(88,166,255,.10),
transparent
);

filter:blur(40px);

z-index:-2;

animation:beamMove 8s ease-in-out infinite;
}

@keyframes beamMove{

0%{
transform:
translateX(-50%)
rotate(25deg)
translateY(-40px);
}

50%{
transform:
translateX(-45%)
rotate(25deg)
translateY(20px);
}

100%{
transform:
translateX(-50%)
rotate(25deg)
translateY(-40px);
}

}
.particles{
position:fixed;

inset:0;

overflow:hidden;

z-index:-1;
}

.particles span{
position:absolute;

display:block;

width:4px;
height:4px;

background:rgba(255,255,255,.15);

border-radius:50%;

animation:particleFloat linear infinite;
}

.particles span:nth-child(1){
left:10%;
animation-duration:12s;
animation-delay:0s;
top:100%;
}

.particles span:nth-child(2){
left:25%;
animation-duration:18s;
animation-delay:2s;
top:100%;
}

.particles span:nth-child(3){
left:40%;
animation-duration:14s;
animation-delay:4s;
top:100%;
}

.particles span:nth-child(4){
left:60%;
animation-duration:20s;
animation-delay:1s;
top:100%;
}

.particles span:nth-child(5){
left:75%;
animation-duration:16s;
animation-delay:3s;
top:100%;
}

.particles span:nth-child(6){
left:90%;
animation-duration:22s;
animation-delay:5s;
top:100%;
}

@keyframes particleFloat{

0%{
transform:translateY(0);
opacity:0;
}

10%{
opacity:1;
}

90%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(30px);
}

100%{
transform:translateY(0px);
}

}
@keyframes fadeUp{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}
</style>
</head>

<body>

<div class="box">

<h1 class="title">Welcome Back</h1>
<p class="subtitle">
Login to continue your journey.
</p>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Sign In
</button>
<div class="bottom-links">

<a href="signup.html">
Create Account
</a>

</div>

<div class="bottom-links"
style="margin-top:12px;">

<a href="forgot-password.html">
Forgot Password?
</a>
</div>
</div>
<div class="bg-blur blur1"></div>
<div class="bg-blur blur2"></div>
<div class="grid-bg"></div>

<div class="light-beam"></div>

<div class="particles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>
<script type="module"
src="../Scripts/app.js"></script>
</body>
</html>
